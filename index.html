<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadeleştirilmiş Çift Grafik IS-LM-FE Analizi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            padding: 30px 15px;
            margin: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 1300px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #34495e;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .reset-btn:hover { background: #c0392b; }

        /* Üst Bölüm: Kontroller ve Grafikler */
        .main-content {
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 25px;
        }
        .controls {
            background: #f9fbfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            height: fit-content;
        }
        .slider-group {
            margin-bottom: 20px;
        }
        label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
            color: #555;
            gap: 4px;
        }
        .label-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .curve-tag {
            font-size: 11px;
            font-weight: bold;
            color: #7f8c8d;
            background: #eaeded;
            padding: 2px 6px;
            border-radius: 4px;
        }
        span.val {
            color: #2980b9;
            font-weight: bold;
            background: #e1f0fa;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #3498db;
            margin-top: 4px;
        }

        /* Çift Sütunlu Panel Düzeni (Grafik + Alt Sekmeler) */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .column-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .column-title {
            margin: 0;
            font-size: 16px;
            color: #2c3e50;
            text-align: center;
            font-weight: bold;
        }
        canvas {
            border: 1px solid #ecf0f1;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            width: 100%;
            height: auto;
        }

        /* Sekmeler / Kartlar */
        .analysis-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #2c3e50;
        }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 8px; }

        /* Kısa Dönem Renkleri */
        .status-card { background: #eaf2f8; border-left: 4px solid #3498db; }
        .warning-card { background: #fdf2e9; border-left: 4px solid #e67e22; }
        .reason-card { background: #fef9e7; border-left: 4px solid #f1c40f; grid-column: 1 / -1; }

        /* Uzun Dönem Renkleri */
        .lr-status-card { background: #f5eef8; border-left: 4px solid #9b59b6; }
        .lr-warning-card { background: #ebf5fb; border-left: 4px solid #2980b9; }
        .lr-reason-card { background: #f4f6f7; border-left: 4px solid #7f8c8d; grid-column: 1 / -1; }

        @media (max-width: 1050px) {
            .main-content { grid-template-columns: 1fr; }
            .workspace { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        Ekonomik Politika Simülatörü
        <button class="reset-btn" onclick="resetSliders()">Sıfırla</button>
    </h2>

    <div class="main-content">
        <div class="controls">
            <div class="slider-group">
                <label>
                    <div class="label-top">
                        <span>Kamu Harcamaları (G) <span class="curve-tag">IS Eğrisi</span></span>
                        <span id="valG" class="val">50</span>
                    </div>
                </label>
                <input type="range" id="sliderG" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>
                    <div class="label-top">
                        <span>Vergiler (T) <span class="curve-tag">IS Eğrisi</span></span>
                        <span id="valT" class="val">50</span>
                    </div>
                </label>
                <input type="range" id="sliderT" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>
                    <div class="label-top">
                        <span>Para Arzı (Ms) <span class="curve-tag">LM Eğrisi</span></span>
                        <span id="valM" class="val">50</span>
                    </div>
                </label>
                <input type="range" id="sliderM" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>
                    <div class="label-top">
                        <span>Para Talebi (Ld) <span class="curve-tag">LM Eğrisi</span></span>
                        <span id="valL" class="val">50</span>
                    </div>
                </label>
                <input type="range" id="sliderL" min="0" max="100" value="50">
            </div>
            <div class="slider-group">
                <label>
                    <div class="label-top">
                        <span>Üretim Kapasitesi (FE) <span class="curve-tag">FE Doğrusu</span></span>
                        <span id="valS" class="val">50</span>
                    </div>
                </label>
                <input type="range" id="sliderS" min="0" max="100" value="50">
            </div>
        </div>

        <div class="workspace">
            
            <div class="column-box">
                <h3 class="column-title">📊 1. Grafik: Kısa Dönem (İlk Etki)</h3>
                <canvas id="srCanvas" width="480" height="340"></canvas>
                
                <div class="analysis-box">
                    <div class="card status-card" id="srResultBox"></div>
                    <div class="card warning-card" id="srGapBox"></div>
                    <div class="card reason-card" id="srReasonBox"></div>
                </div>
            </div>

            <div class="column-box">
                <h3 class="column-title">⏳ 2. Grafik: Uzun Dönem (Nihai Durum)</h3>
                <canvas id="lrCanvas" width="480" height="340"></canvas>
                
                <div class="analysis-box">
                    <div class="card lr-status-card" id="lrResultBox"></div>
                    <div class="card lr-warning-card" id="lrGapBox"></div>
                    <div class="card lr-reason-card" id="lrReasonBox"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const sliders = {
        G: document.getElementById('sliderG'),
        T: document.getElementById('sliderT'),
        M: document.getElementById('sliderM'),
        L: document.getElementById('sliderL'),
        S: document.getElementById('sliderS')
    };
    
    const vals = {
        G: document.getElementById('valG'),
        T: document.getElementById('valT'),
        M: document.getElementById('valM'),
        L: document.getElementById('valL'),
        S: document.getElementById('valS')
    };

    function resetSliders() {
        Object.values(sliders).forEach(s => s.value = 50);
        draw();
    }

    function setupCanvas(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        const margin = { top: 30, right: 30, bottom: 40, left: 50 };
        const chartW = w - margin.left - margin.right;
        const chartH = h - margin.top - margin.bottom;

        return {
            ctx, w, h, margin,
            scaleX: (y) => margin.left + (y / 1000) * chartW,
            scaleY: (r) => h - margin.bottom - (r / 100) * chartH
        };
    }

    function drawAxes(c) {
        c.ctx.setLineDash([]);
        c.ctx.beginPath();
        c.ctx.strokeStyle = '#333';
        c.ctx.lineWidth = 2;
        c.ctx.moveTo(c.margin.left, c.margin.top - 10);
        c.ctx.lineTo(c.margin.left, c.h - c.margin.bottom);
        c.ctx.moveTo(c.margin.left, c.h - c.margin.bottom);
        c.ctx.lineTo(c.w - c.margin.right + 10, c.h - c.margin.bottom);
        c.ctx.stroke();

        c.ctx.fillStyle = '#333'; c.ctx.font = '12px Arial';
        c.ctx.fillText('Faiz Oranı', c.margin.left - 40, c.margin.top - 18);
        c.ctx.fillText('Üretim / Gelir', c.w - c.margin.right - 40, c.h - c.margin.bottom + 30);
    }

    function drawLine(c, x1, y1, x2, y2, color, width, text = '', textX = 0, textY = 0) {
        c.ctx.setLineDash([]);
        c.ctx.beginPath();
        c.ctx.strokeStyle = color;
        c.ctx.lineWidth = width;
        c.ctx.moveTo(c.scaleX(x1), c.scaleY(y1));
        c.ctx.lineTo(c.scaleX(x2), c.scaleY(y2));
        c.ctx.stroke();
        
        if (text) {
            c.ctx.fillStyle = color;
            c.ctx.font = 'bold 13px Arial';
            c.ctx.fillText(text, c.scaleX(textX), c.scaleY(textY));
        }
    }

    function drawPoint(c, y, r, color, label) {
        c.ctx.beginPath();
        c.ctx.arc(c.scaleX(y), c.scaleY(r), 5, 0, 2 * Math.PI);
        c.ctx.fillStyle = color; c.ctx.fill();
        c.ctx.strokeStyle = '#fff'; c.ctx.lineWidth = 1.5; c.ctx.stroke();

        c.ctx.fillStyle = '#333'; c.ctx.font = 'bold 11px Arial';
        c.ctx.fillText(label, c.scaleX(y) + 8, c.scaleY(r) - 6);
    }

    function draw() {
        const G = parseInt(sliders.G.value);
        const T = parseInt(sliders.T.value);
        const M = parseInt(sliders.M.value);
        const L = parseInt(sliders.L.value);
        const S = parseInt(sliders.S.value);

        vals.G.innerText = G; vals.T.innerText = T;
        vals.M.innerText = M; vals.L.innerText = L; vals.S.innerText = S;

        // Cari Matematiksel Yapı
        const isIntercept = 100 + (G - 50) - (T - 50);
        const lmInterceptSR = -(M - 50) + (L - 50); 
        const feY = 500 + (S - 50) * 5;

        // Kısa Dönem Denge Hesabı
        const eqY_SR = (isIntercept - lmInterceptSR) / 0.2;
        const eqR_SR = 0.1 * eqY_SR + lmInterceptSR;

        // Uzun Dönem Denge Hesabı
        const eqY_LR = feY;
        const eqR_LR = isIntercept - 0.1 * feY;
        const lmInterceptLR = eqR_LR - 0.1 * eqY_LR;

        // ==========================================
        // 1. GRAFİK ÇİZİMİ: KISA DÖNEM (sr)
        // ==========================================
        const sr = setupCanvas('srCanvas');
        sr.ctx.clearRect(0, 0, sr.w, sr.h);
        drawAxes(sr);

        // Aktif Eğriler
        drawLine(sr, feY, 95, feY, 5, '#27ae60', 2.5, 'Kapasite (FE)', feY + 5, 90);
        drawLine(sr, 0, isIntercept, 1000, isIntercept - 100, '#e74c3c', 2.5, 'Talep (IS)', 830, isIntercept - 85);
        drawLine(sr, 0, lmInterceptSR, 1000, 100 + lmInterceptSR, '#2980b9', 2.5, 'Para (LM)', 830, 85 + lmInterceptSR);
        
        // Denge Noktası
        drawPoint(sr, eqY_SR, eqR_SR, '#8e44ad', 'Mevcut Durum (E_SR)');


        // ==========================================
        // 2. GRAFİK ÇİZİMİ: UZUN DÖNEM (lr)
        // ==========================================
        const lr = setupCanvas('lrCanvas');
        lr.ctx.clearRect(0, 0, lr.w, lr.h);
        drawAxes(lr);

        // Uzun dönem eğrileri
        drawLine(lr, feY, 95, feY, 5, '#27ae60', 2.5, 'Kapasite (FE)', feY + 5, 90);
        drawLine(lr, 0, isIntercept, 1000, isIntercept - 100, '#e74c3c', 2.5, 'Talep (IS)', 830, isIntercept - 85);
        drawLine(lr, 0, lmInterceptLR, 1000, 100 + lmInterceptLR, '#9b59b6', 2.5, 'Yeni Para (LM)', 830, 85 + lmInterceptLR);
        
        // Denge Noktası
        drawPoint(lr, eqY_LR, eqR_LR, '#9b59b6', 'Gelecek Durum (E_LR)');


        // ==========================================
        // DİNAMİK AÇIKLAMALAR
        // ==========================================
        const gap = Math.round(eqY_SR - feY);

        // --- SOL SÜTUN (KISA DÖNEM) ---
        document.getElementById('srResultBox').innerHTML = `
            <h3>📊 Şu Anki Durum</h3>
            <b>Üretim Seviyesi:</b> ${Math.round(eqY_SR)}<br>
            <b>Faiz Oranı:</b> %${Math.max(0, Math.round(eqR_SR))}
        `;

        let srGapHtml = `<h3>⚖️ Piyasanın Nabzı</h3>`;
        if (gap > 0) {
            srGapHtml += `<span style="color:#c0392b; font-weight:bold;">Aşırı Canlılık Var (+${gap})</span><br>Ekonomi normal kapasitesinin üzerinde çalışıyor. Mağazalar ve fabrikalar ağzına kadar dolu.`;
        } else if (gap < 0) {
            srGapHtml += `<span style="color:#d35400; font-weight:bold;">Durgunluk Var (${gap})</span><br>Ekonomi potansiyelinin altında kalmış. Fabrikalar tam kapasite çalışmıyor, işsizlik riski var.`;
        } else {
            srGapHtml += `<span style="color:#27ae60; font-weight:bold;">İdeal Denge</span><br>Ekonomi tam olması gerektiği gibi, fabrikalar ideal kapasitesinde çalışıyor.`;
        }
        document.getElementById('srGapBox').innerHTML = srGapHtml;

        let srReasonsHtml = `<h3>🧠 Kısa Vadede Ne Oldu? (Eğri Hareketleri)</h3><ul>`;
        let changed = false;
        if (G > 50) { srReasonsHtml += `<li><b>Devlet Harcamaları Arttı:</b> Piyasaya daha çok para girdi, mal talebi ve üretim yükseldi. Bu durum <b>Talep (IS) eğrisini sağa kaydırdı</b>. Yoğunluktan dolayı faizler de biraz tırmandı.</li>`; changed = true; }
        if (G < 50) { srReasonsHtml += `<li><b>Devlet Harcamaları Azaldı:</b> Devlet piyasadan elini çekince harcamalar ve üretim düştü. Bu durum <b>Talep (IS) eğrisini sola kaydırdı</b>. Faizler de aşağı indi.</li>`; changed = true; }
        if (T > 50) { srReasonsHtml += `<li><b>Vergiler Arttı:</b> Halkın cebinde az para kaldığı için harcamalar kısıldı, fabrikalar üretimi düşürdü. Bu durum <b>Talep (IS) eğrisini sola kaydırdı</b>.</li>`; changed = true; }
        if (T < 50) { srReasonsHtml += `<li><b>Vergiler İndirildi:</b> İnsanların eline daha çok para geçti, alışverişler canlandı ve üretim arttı. Bu durum <b>Talep (IS) eğrisini sağa kaydırdı</b>.</li>`; changed = true; }
        if (M > 50) { srReasonsHtml += `<li><b>Piyasaya Para Sürüldü:</b> Bankalarda para bollaşınca kredi faizleri düştü, yatırımlar ve üretim canlandı. Bu durum <b>Para (LM) eğrisini sağa kaydırdı</b>.</li>`; changed = true; }
        if (M < 50) { srReasonsHtml += `<li><b>Piyasadan Para Çekildi:</b> Para azaldığı için faizler yükseldi, krediler pahalılaştı ve üretim yavaşladı. Bu durum <b>Para (LM) eğrisini sola kaydırdı</b>.</li>`; changed = true; }
        if (L > 50) { srReasonsHtml += `<li><b>Paraya Talep Arttı:</b> Herkes nakitte kalmak isteyince faizler fırladı. Yüksek faiz yatırımları vurdu. Bu durum <b>Para (LM) eğrisini sola kaydırdı</b>.</li>`; changed = true; }
        if (L < 50) { srReasonsHtml += `<li><b>Paraya Talep Azaldı:</b> İnsanlar nakit yerine harcamaya yöneldi, faizler düştü ve üretim desteklendi. Bu durum <b>Para (LM) eğrisini sağa kaydırdı</b>.</li>`; changed = true; }
        if (S > 50) { srReasonsHtml += `<li><b>Üretim Kolaylaştı (Teknoloji):</b> Yeni bir teknoloji veya ucuz hammadde sayesinde ülkenin üretebileceği maksimum sınır genişledi. Bu durum <b>Kapasite (FE) doğrusunu sağa kaydırdı</b>.</li>`; changed = true; }
        if (S < 50) { srReasonsHtml += `<li><b>Üretim Zorlaştı (Kriz):</b> Deprem, savaş veya enerji krizi gibi bir nedenle ülkenin üretim gücü kalıcı olarak zarar gördü. Bu durum <b>Kapasite (FE) doğrusunu sola kaydırdı</b>.</li>`; changed = true; }
        if (!changed) srReasonsHtml += `<li>Her şey başlangıç seviyesinde dengede. Sol taraftaki çubukları oynatarak ekonomideki değişimleri başlatabilirsiniz.</li>`;
        srReasonsHtml += `</ul>`;
        document.getElementById('srReasonBox').innerHTML = srReasonsHtml;


        // --- SAĞ SÜTUN (UZUN DÖNEM) ---
        document.getElementById('lrResultBox').innerHTML = `
            <h3>🏛️ Gelecekteki (Nihai) Durum</h3>
            <b>Üretim Seviyesi:</b> ${Math.round(eqY_LR)}<br>
            <b>Faiz Oranı:</b> %${Math.max(0, Math.round(eqR_LR))}
        `;

        let lrGapHtml = `<h3>📈 Fiyatlar ve Enflasyon Ne Olacak?</h3>`;
        if (gap > 0) {
            lrGapHtml += `<span style="color:#9b59b6; font-weight:bold;">Fiyatlar Artacak (Enflasyon)</span><br>Kısa vadedeki bu aşırı canlılık ve yoğun talep, uzun vadede zam olarak geri dönecek.`;
        } else if (gap < 0) {
            lrGapHtml += `<span style="color:#2980b9; font-weight:bold;">Fiyatlar Düşecek (Ucuzluk)</span><br>Piyasadaki bu durgunluk ve işsizlik, uzun vadede fiyatların ve ücretlerin aşağı inmesine neden olacak.`;
        } else {
            lrGapHtml += `<span style="color:#27ae60; font-weight:bold;">Fiyatlar Değişmeyecek</span><br>Piyasa zaten dengede olduğu için fiyatlarda ekstra bir oynama beklenmiyor.`;
        }
        document.getElementById('lrGapBox').innerHTML = lrGapHtml;

        let lrReasonsHtml = `<h3>⚙️ Uzun Vadede Ekonomi Kendini Nasıl Düzeltecek?</h3><ul>`;
        if (gap > 0) {
            lrReasonsHtml += `<li><b>Uyum Mekanizması:</b> Piyasa aşırı canlı olduğu için zamanla fiyatlar zamlanır. Fiyatlar artınca, insanların cebindeki paranın alım gücü erir. Bu durum piyasadaki kullanılabilir parayı azalttığı için <b>Para (LM) eğrisini sola kaydırarak Yeni Para (LM) konumuna getirir</b>. Harcamalar zorunlu olarak yavaşlar, faizler yükselir ve üretim Kapasite (FE) sınırına geri çekilir.</li>`;
        } else if (gap < 0) {
            lrReasonsHtml += `<li><b>Uyum Mekanizması:</b> Piyasa durgun ve işsizlik yüksek olduğu için zamanla fiyatlar ve ücretler ucuzlar. Fiyatların düşmesi, eldeki mevcut paranın satın alma gücünü (değerini) kendiliğinden artırır. Para bollaşmış gibi bir etki yaratır ve <b>Para (LM) eğrisini sağa kaydırarak Yeni Para (LM) konumuna getirir</b>. Faizler düşer, alışverişler yeniden başlar ve ekonomi Kapasite (FE) sınırına geri döner.</li>`;
        } else {
            lrReasonsHtml += `<li>Ekonomi zaten tam kapasitede çalıştığı için uzun vadede fiyatlarda bir düzeltme yaşanmaz. Para (LM) eğrisinin yer değiştirmesine gerek kalmaz.</li>`;
        }
        lrReasonsHtml += `</ul>`;
        document.getElementById('lrReasonBox').innerHTML = lrReasonsHtml;
    }

    Object.values(sliders).forEach(slider => {
        slider.addEventListener('input', draw);
    });

    draw();
</script>

</body>
</html>
